<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockly — Inventory Dashboard (demo)</title>
<meta name="description" content="Demo de dashboard premium de gestión de inventario. Oracle APEX-ready. Por Manuel Albar Diaz.">
<style>
:root{
  --bg:#0b1020; --bg2:#0f152b; --panel:#141b33; --panel2:#172040;
  --line:#243056; --line2:#2e3a66;
  --txt:#eaf0ff; --muted:#9aa6c8; --faint:#6b769c;
  --acc:#6366f1; --acc2:#8b5cf6; --acc-g:linear-gradient(135deg,#6366f1,#8b5cf6);
  --ok:#34d399; --warn:#fbbf24; --bad:#f87171;
  --r:16px; --r2:12px; --sh:0 10px 30px -12px rgba(0,0,0,.55);
  --ff:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--ff); color:var(--txt);
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(99,102,241,.16), transparent 60%),
    radial-gradient(900px 500px at -5% 10%, rgba(139,92,246,.12), transparent 55%),
    var(--bg);
  min-height:100vh; padding:clamp(14px,3vw,30px); line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1240px;margin:0 auto;display:flex;flex-direction:column;gap:clamp(14px,2.4vw,22px)}

/* ---------- TOPBAR ---------- */
.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.logo{width:38px;height:38px;border-radius:11px;background:var(--acc-g);display:grid;place-items:center;box-shadow:0 6px 18px -6px rgba(99,102,241,.7)}
.logo svg{width:21px;height:21px}
.brand b{font-size:1.28rem;letter-spacing:-.02em;font-weight:700}
.brand b span{background:var(--acc-g);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand small{display:block;color:var(--faint);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;margin-top:-2px}
.ctrls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:.82rem;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.18s}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--acc-g);color:#fff;box-shadow:0 4px 12px -4px rgba(99,102,241,.7)}
.sel{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;transition:.18s}
.sel:hover{border-color:var(--line2);color:var(--txt)}
.sel svg{width:15px;height:15px;opacity:.7}
.lang{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
.lang button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:.78rem;font-weight:700;padding:6px 11px;border-radius:7px;cursor:pointer;transition:.18s}
.lang button.on{background:var(--acc-g);color:#fff}

/* ---------- CARD BASE ---------- */
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);position:relative;overflow:hidden}
.card .hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px 0}
.card .hd h2{font-size:.95rem;font-weight:700;letter-spacing:-.01em}
.card .hd .sub{color:var(--faint);font-size:.74rem}

/* ---------- KPIs ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:clamp(12px,1.8vw,18px)}
.kpi{padding:18px 18px 14px}
.kpi::before{content:"";position:absolute;inset:0 auto auto 0;width:100%;height:3px;background:var(--acc-g);opacity:.9}
.kpi .lbl{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.78rem;font-weight:600}
.kpi .lbl .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:rgba(99,102,241,.14);color:#a9b1ff}
.kpi .lbl .ic svg{width:16px;height:16px}
.kpi .val{font-size:clamp(1.5rem,3vw,1.95rem);font-weight:800;letter-spacing:-.03em;margin:11px 0 2px;font-variant-numeric:tabular-nums}
.kpi .ft{display:flex;align-items:center;justify-content:space-between;gap:8px}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:.76rem;font-weight:700;padding:2px 7px;border-radius:20px;font-variant-numeric:tabular-nums}
.delta svg{width:12px;height:12px}
.delta.up{color:var(--ok);background:rgba(52,211,153,.12)}
.delta.down{color:var(--bad);background:rgba(248,113,113,.12)}
.delta.flat{color:var(--muted);background:rgba(154,166,200,.1)}
.spark{width:84px;height:30px;flex:none}

/* ---------- GRID ---------- */
.row{display:grid;gap:clamp(12px,1.8vw,18px)}
.row.charts{grid-template-columns:1.5fr 1fr}
.row.bottom{grid-template-columns:1.7fr 1fr}
@media(max-width:900px){.row.charts,.row.bottom{grid-template-columns:1fr}}

/* ---------- AREA CHART ---------- */
.chartbox{padding:14px 8px 8px}
.legend{display:flex;gap:16px;padding:0 12px 6px}
.legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.78rem;font-weight:600}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
svg.chart{width:100%;height:auto;display:block;overflow:visible}
.gline{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.dot{cursor:pointer;transition:r .15s}
.tip{position:fixed;z-index:50;background:#0a0f1f;border:1px solid var(--line2);border-radius:10px;padding:8px 11px;font-size:.78rem;box-shadow:0 12px 30px -8px rgba(0,0,0,.7);pointer-events:none;opacity:0;transform:translateY(4px);transition:.13s;white-space:nowrap}
.tip.on{opacity:1;transform:translateY(0)}
.tip .tt{color:var(--faint);font-size:.7rem;margin-bottom:3px}
.tip .tr{display:flex;align-items:center;gap:7px;font-weight:600}
.tip .tr i{width:8px;height:8px;border-radius:2px}

/* ---------- CATEGORY BARS ---------- */
.bars{padding:14px 18px 18px;display:flex;flex-direction:column;gap:13px}
.bar .bt{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:6px}
.bar .bt b{font-weight:600}
.bar .bt span{color:var(--muted);font-variant-numeric:tabular-nums}
.bar .track{height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.bar .fill{height:100%;border-radius:6px;background:var(--acc-g);width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}

/* ---------- TABLE ---------- */
.tbl-wrap{padding:6px 6px 6px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{text-align:left;padding:11px 14px;white-space:nowrap}
thead th{color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
thead th:hover{color:var(--txt)}
thead th .ar{opacity:.4;font-size:.7rem}
thead th.sorted .ar{opacity:1;color:var(--acc2)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(99,102,241,.06)}
tbody tr:last-child{border-bottom:0}
.prod{font-weight:600}
.cat{color:var(--muted);font-size:.8rem}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:700;padding:3px 9px;border-radius:20px}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.chip.ok{color:var(--ok);background:rgba(52,211,153,.1)}
.chip.low{color:var(--warn);background:rgba(251,191,36,.1)}
.chip.out{color:var(--bad);background:rgba(248,113,113,.1)}

/* ---------- ALERTS ---------- */
.alerts{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px}
.alert{display:flex;gap:11px;padding:11px 12px;border-radius:var(--r2);background:rgba(255,255,255,.025);border:1px solid var(--line)}
.alert .ad{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center}
.alert.warn .ad{background:rgba(251,191,36,.14);color:var(--warn)}
.alert.bad .ad{background:rgba(248,113,113,.14);color:var(--bad)}
.alert .ad svg{width:16px;height:16px}
.alert .at{font-size:.83rem;font-weight:600;line-height:1.3}
.alert .as{color:var(--muted);font-size:.76rem;margin-top:2px}

.foot{text-align:center;color:var(--faint);font-size:.76rem;padding:6px 0 2px}
.foot a{color:var(--acc2);text-decoration:none}
.foot a:hover{text-decoration:underline}

/* ---------- ANIM ---------- */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.rise{animation:rise .6s cubic-bezier(.22,1,.36,1) both;animation-delay:var(--d,0s)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<!-- icon sprite -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
<symbol id="i-box" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></symbol>
<symbol id="i-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></symbol>
<symbol id="i-cycle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></symbol>
<symbol id="i-swap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10 3 6l4-4M3 6h13M17 14l4 4-4 4M21 18H8"/></symbol>

</svg>

<div class="wrap">

  <!-- TOPBAR -->
  <header class="top rise">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/></svg></span>
      <div><b>Stock<span>ly</span></b><small data-i="brandsub">Inventory Intelligence</small></div>
    </div>
    <div class="ctrls">
      <div class="seg" id="period" role="group" aria-label="Período">

  </p>

<script>
'use strict';
/* ===== i18n ===== */
var I18N={
  es:{brandsub:'Inventory Intelligence',p_d:'Hoy',p_w:'Semana',p_m:'Mes',wh_all:'Todos los depósitos',
      flow_t:'Entradas vs salidas',flow_s:'por día — mes actual',in:'Entradas',out:'Salidas',
      cat_t:'Stock por categoría',cat_s:'valorizado',tbl_t:'Productos',tbl_s:'clic en columnas para ordenar',
      al_t:'Alertas de stock',foot:'Demo de dashboard premium · datos simulados · Oracle APEX-ready',
      k_val:'Valor del inventario',k_low:'Ítems bajo reorden',k_rot:'Rotación de stock',k_mov:'Movimientos netos',
      vs:'vs. mes anterior',units:'u.',
      th_prod:'Producto',th_cat:'Categoría',th_stock:'Stock',th_re:'Reorden',th_st:'Estado',th_val:'Valor',
      st_ok:'OK',st_low:'Bajo',st_out:'Quiebre',
      a_out:'sin stock',a_low:'bajo el punto de reorden',a_over:'sobrestock vs. demanda'},
  en:{brandsub:'Inventory Intelligence',p_d:'Today',p_w:'Week',p_m:'Month',wh_all:'All warehouses',
      flow_t:'Inflow vs outflow',flow_s:'per day — current month',in:'Inflow',out:'Outflow',
      cat_t:'Stock by category',cat_s:'valued',tbl_t:'Products',tbl_s:'click headers to sort',
      al_t:'Stock alerts',foot:'Premium dashboard demo · simulated data · Oracle APEX-ready',
      k_val:'Inventory value',k_low:'Items below reorder',k_rot:'Stock turnover',k_mov:'Net movements',
      vs:'vs. last month',units:'u.',
      th_prod:'Product',th_cat:'Category',th_stock:'Stock',th_re:'Reorder',th_st:'Status',th_val:'Value',
      st_ok:'OK',st_low:'Low',st_out:'Out',
      a_out:'out of stock',a_low:'below reorder point',a_over:'overstock vs. demand'}
};
var LANG='es';
function t(k){return (I18N[LANG][k]!=null?I18N[LANG][k]:k)}
function locale(){return LANG==='es'?'es-CO':'en-US'}
function money(v){return '$'+new Intl.NumberFormat(locale()).format(Math.round(v))}
function moneyM(v){return '$'+new Intl.NumberFormat(locale(),{minimumFractionDigits:1,maximumFractionDigits:1}).format(v/1e6)+'M'}
function num(v){return new Intl.NumberFormat(locale()).format(v)}

/* ===== data (simulada) ===== */
var FLOW_IN =[42,38,55,61,48,67,72,60,51,44,58,69,74,63,71,49,46,62,57,68,70,55,49,41,56,60,66,72,61,47];
var FLOW_OUT=[39,41,48,52,55,58,61,57,49,46,53,60,66,59,64,52,48,57,54,62,65,51,47,44,51,55,59,63,58,50];
var DATA={
  kpis:[
    {k:'k_val',ic:'i-box', val:842500000,prev:798200000,fmt:moneyM,good:'up'},
    {k:'k_low',ic:'i-alert',val:14,prev:9,fmt:num,good:'down',suffix:''},
    {k:'k_rot',ic:'i-cycle',val:4.8,prev:4.3,fmt:function(v){return new Intl.NumberFormat(locale(),{minimumFractionDigits:1,maximumFractionDigits:1}).format(v)+'×'},good:'up'},
    {k:'k_mov',ic:'i-swap',val:1786,prev:1642,fmt:num,good:'up'}
  ],
  cats:[
    {n:'Notebooks',v:312000000},{n:'Monitores',v:198000000},{n:'Periféricos',v:121000000},
    {n:'Redes',v:96000000},{n:'Almacenamiento',v:74000000},{n:'Accesorios',v:41500000}
  ],
  catsEn:['Laptops','Monitors','Peripherals','Networking','Storage','Accessories'],
  prods:[
    {n:'Notebook Pro 14"',c:0,stock:128,re:40,val:230400000},
    {n:'Monitor 27" 4K',c:1,stock:8,re:25,val:14400000},
    {n:'Teclado mecánico',c:2,stock:0,re:30,val:0},
    {n:'Mouse inalámbrico',c:2,stock:340,re:80,val:10200000},
    {n:'Switch 24p Gigabit',c:3,stock:17,re:20,val:13600000},
    {n:'SSD NVMe 1TB',c:4,stock:96,re:50,val:28800000},
    {n:'Webcam HD',c:2,stock:6,re:25,val:1800000},
    {n:'Router WiFi 6',c:3,stock:54,re:30,val:21600000}
  ],
  prodsEn:['Pro Laptop 14"','27" 4K Monitor','Mechanical keyboard','Wireless mouse','24p Gigabit Switch','1TB NVMe SSD','HD Webcam','WiFi 6 Router']
};

/* ===== helpers ===== */
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e}
function icon(id){return '<svg><use href="#'+id+'"/></svg>'}
function sparkPath(arr,w,h){
  var mn=Math.min.apply(null,arr),mx=Math.max.apply(null,arr),rg=(mx-mn)||1;
  return arr.map(function(v,i){return (i?'L':'M')+(i/(arr.length-1)*w).toFixed(1)+' '+(h-(v-mn)/rg*h).toFixed(1)}).join(' ');
}
function status(p){return p.stock===0?'out':(p.stock<p.re?'low':'ok')}

/* ===== render KPIs ===== */
function renderKpis(){
  var box=document.getElementById('kpis');box.innerHTML='';
  DATA.kpis.forEach(function(d,i){
    var diff=d.val-d.prev, pctv=d.prev?((diff/d.prev)*100):0;
    var goodUp=d.good==='up', isGood=goodUp?diff>=0:diff<=0;
    var cls=diff===0?'flat':(isGood?'up':'down');
    var arrow=diff>=0?'i-up':'i-down';
    var spk=(d.k==='k_low')?[9,11,8,12,10,13,11,14]:(d.k==='k_mov'?FLOW_IN.slice(-8):[d.prev*.94,d.prev*.97,d.prev,d.prev*1.02,d.val*.98,d.val*.99,d.val*1.0,d.val].map(function(x){return x}));
    var col=cls==='up'?'#34d399':cls==='down'?'#f87171':'#9aa6c8';
    var c=el('article','card kpi rise');c.style.setProperty('--d',(i*.05)+'s');
    c.innerHTML=
      '<div class="lbl"><span class="ic">'+icon(d.ic)+'</span>'+t(d.k)+'</div>'+
      '<div class="val">'+d.fmt(d.val)+(d.suffix||'')+'</div>'+
      '<div class="ft">'+
        '<span class="delta '+cls+'">'+icon(arrow)+(Math.abs(pctv).toFixed(1).replace('.',LANG==='es'?',':'.'))+'%</span>'+
        '<svg class="spark" viewBox="0 0 84 30" preserveAspectRatio="none"><path d="'+sparkPath(spk,84,28)+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/></svg>'+
      '</div>';
    box.appendChild(c);
  });
}

/* ===== render flow chart (area dual) ===== */
function renderFlow(){
  var box=document.getElementById('flow');
  var W=560,H=210,pad=8;
  var all=FLOW_IN.concat(FLOW_OUT),mx=Math.max.apply(null,all)*1.08;
  function pts(arr){return arr.map(function(v,i){return [pad+i/(arr.length-1)*(W-pad*2), H-pad-(v/mx)*(H-pad*2)]})}
  function line(p){return p.map(function(c,i){return (i?'L':'M')+c[0].toFixed(1)+' '+c[1].toFixed(1)}).join(' ')}
  function area(p){return line(p)+' L'+(W-pad)+' '+(H-pad)+' L'+pad+' '+(H-pad)+' Z'}
  var pin=pts(FLOW_IN),pout=pts(FLOW_OUT);
  var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" role="img">';
  svg+='<defs><linearGradient id="gin" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#34d399" stop-opacity=".34"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></linearGradient>'+
       '<linearGradient id="gout" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#f87171" stop-opacity=".26"/><stop offset="1" stop-color="#f87171" stop-opacity="0"/></linearGradient></defs>';
  for(var g=1;g<4;g++){var y=pad+g/4*(H-pad*2);svg+='<line x1="'+pad+'" x2="'+(W-pad)+'" y1="'+y+'" y2="'+y+'" stroke="rgba(255,255,255,.05)"/>'}
  svg+='<path d="'+area(pin)+'" fill="url(#gin)"/><path d="'+area(pout)+'" fill="url(#gout)"/>';
  svg+='<path class="gline" d="'+line(pin)+'" stroke="#34d399"/><path class="gline" d="'+line(pout)+'" stroke="#f87171"/>';
  pin.forEach(function(c,i){svg+='<circle class="dot" cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="2.4" fill="#34d399" data-i="'+i+'" data-s="in"/>'});
  pout.forEach(function(c,i){svg+='<circle class="dot" cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="2.4" fill="#f87171" data-i="'+i+'" data-s="out"/>'});
  svg+='</svg>';
  box.innerHTML=svg;
  box.querySelectorAll('.dot').forEach(function(d){
    d.addEventListener('mouseenter',function(e){
      var i=+d.getAttribute('data-i');
      showTip(e,(LANG==='es'?'Día ':'Day ')+(i+1),[['#34d399',t('in'),FLOW_IN[i]],['#f87171',t('out'),FLOW_OUT[i]]]);
      d.setAttribute('r','4.5');
    });
    d.addEventListener('mouseleave',function(){hideTip();d.setAttribute('r','2.4')});
  });
}

/* ===== render category bars ===== */
function renderCats(){
  var box=document.getElementById('cats');box.innerHTML='';
  var mx=Math.max.apply(null,DATA.cats.map(function(c){return c.v}));
  DATA.cats.forEach(function(c,i){
    var name=LANG==='es'?c.n:DATA.catsEn[i];
    var b=el('div','bar');
    b.innerHTML='<div class="bt"><b>'+name+'</b><span>'+moneyM(c.v)+'</span></div><div class="track"><div class="fill"></div></div>';
    box.appendChild(b);
    var fill=b.querySelector('.fill');
    setTimeout(function(){fill.style.width=(c.v/mx*100).toFixed(1)+'%'},60+i*70);
  });
}

/* ===== render table ===== */
var sortKey='val',sortDir=-1;
function renderTable(){
  var tbl=document.getElementById('tbl');
  var cols=[['n','th_prod',''],['c','th_cat',''],['stock','th_stock','num'],['re','th_re','num'],['st','th_st',''],['val','th_val','num']];
  var rows=DATA.prods.map(function(p,idx){return {n:LANG==='es'?p.n:DATA.prodsEn[idx],c:LANG==='es'?DATA.cats[p.c].n:DATA.catsEn[p.c],stock:p.stock,re:p.re,st:status(p),val:p.val,_st:status(p)}});
  var ord={out:0,low:1,ok:2};
  rows.sort(function(a,b){
    var x=a[sortKey],y=b[sortKey];
    if(sortKey==='st'){x=ord[a._st];y=ord[b._st]}
    if(typeof x==='string'){return x.localeCompare(y)*sortDir}
    return (x-y)*sortDir;
  });
  var h='<thead><tr>';
  cols.forEach(function(c){h+='<th class="'+(c[2]?'num ':'')+(c[0]===sortKey?'sorted':'')+'" data-k="'+c[0]+'">'+t(c[1])+' <span class="ar">'+(c[0]===sortKey?(sortDir<0?'▼':'▲'):'⇅')+'</span></th>'});
  h+='</tr></thead><tbody>';
  rows.forEach(function(r){
    var chip=r.st==='out'?'out':r.st==='low'?'low':'ok';
    var lbl=r.st==='out'?t('st_out'):r.st==='low'?t('st_low'):t('st_ok');
    h+='<tr><td class="prod">'+r.n+'</td><td class="cat">'+r.c+'</td>'+
       '<td class="num">'+num(r.stock)+'</td><td class="num">'+num(r.re)+'</td>'+
       '<td><span class="chip '+chip+'">'+lbl+'</span></td>'+
       '<td class="num">'+money(r.val)+'</td></tr>';
  });
  h+='</tbody>';
  tbl.innerHTML=h;
  tbl.querySelectorAll('th').forEach(function(th){
    th.addEventListener('click',function(){
      var k=th.getAttribute('data-k');
      if(k===sortKey){sortDir*=-1}else{sortKey=k;sortDir=(k==='n'||k==='c')?1:-1}
      renderTable();
    });
  });
}

/* ===== render alerts ===== */
function renderAlerts(){
  var box=document.getElementById('alerts');box.innerHTML='';
  var al=[];
  DATA.prods.forEach(function(p,i){
    var name=LANG==='es'?p.n:DATA.prodsEn[i];
    if(p.stock===0)al.push({lv:'bad',n:name,msg:t('a_out')});
    else if(p.stock<p.re)al.push({lv:'warn',n:name,msg:t('a_low')+' ('+p.stock+'/'+p.re+')'});
  });
  al.slice(0,5).forEach(function(a){
    var e=el('div','alert '+a.lv);
    e.innerHTML='<span class="ad">'+icon('i-alert')+'</span><div><div class="at">'+a.n+'</div><div class="as">'+a.msg+'</div></div>';
    box.appendChild(e);
  });
}

/* ===== tooltip ===== */
var tip=document.getElementById('tip');
function showTip(e,title,rows){
  var h='<div class="tt">'+title+'</div>';
  rows.forEach(function(r){h+='<div class="tr"><i style="background:'+r[0]+'"></i>'+r[1]+': <b>'+num(r[2])+' '+t('units')+'</b></div>'});
  tip.innerHTML=h;tip.classList.add('on');moveTip(e);
}
function moveTip(e){var x=e.clientX+14,y=e.clientY-10;if(x+170>innerWidth)x=e.clientX-170;tip.style.left=x+'px';tip.style.top=y+'px'}
function hideTip(){tip.classList.remove('on')}
document.addEventListener('mousemove',function(e){if(tip.classList.contains('on'))moveTip(e)});

/* ===== i18n apply ===== */
function applyI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i]').forEach(function(e){e.textContent=t(e.getAttribute('data-i'))});
}

/* ===== render all ===== */
function renderAll(){applyI18n();renderKpis();renderFlow();renderCats();renderTable();renderAlerts()}

/* ===== controls ===== */
document.getElementById('lang').addEventListener('click',function(e){
  var b=e.target.closest('button');if(!b)return;
  LANG=b.getAttribute('data-l');
  this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b)});
  renderAll();
});
document.getElementById('period').addEventListener('click',function(e){
  var b=e.target.closest('button');if(!b)return;
  this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b)});
});

renderAll();
</script>
